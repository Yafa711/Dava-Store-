name: dava_store
description: DAVA Store - Premium E-Commerce App with Clean Architecture
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.15.0
  firebase_messaging: ^14.7.10
  firebase_storage: ^11.6.0

  # Google Sign-In
  google_sign_in: ^6.2.1

  # State Management
  provider: ^6.1.1

  # Local Storage / Caching
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI Components
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.0.0
  flutter_staggered_grid_view: ^0.7.0
  carousel_slider: ^4.2.1
  badges: ^3.1.2
  glass_kit: ^3.0.0
  blur: ^3.1.0

  # Navigation
  go_router: ^13.1.0

  # Network
  dio: ^5.4.0
  connectivity_plus: ^5.0.2

  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3
  equatable: ^2.0.5
  dartz: ^0.10.1
  rxdart: ^0.27.7

  # Image
  image_picker: ^1.0.7
  flutter_image_compress: ^2.1.0

  # Notifications
  flutter_local_notifications: ^16.3.0
  permission_handler: ^11.3.0

  # Icons
  flutter_svg: ^2.0.10+1
  font_awesome_flutter: ^10.7.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  fonts:
    - family: Rajdhani
      fonts:
        - asset: assets/fonts/Rajdhani-Regular.ttf
        - asset: assets/fonts/Rajdhani-Bold.ttf
          weight: 700
        - asset: assets/fonts/Rajdhani-SemiBold.ttf
          weight: 600
